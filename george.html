<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myceliate CV | George Steward</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="mycelium-canvas"></canvas>

    <div class="glass-overlay">
        <div class="header">
            <h1>Myceliate<span>.cv</span></h1>
            <p class="subtitle">Interact with the decentralized persona of George Steward</p>
            <a href="/review" class="review-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 20h9"></path>
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                </svg>
                Write a Review
            </a>
        </div>

        <div class="chat-container">
            <div id="messages-area" class="messages-area">
                <div class="message ai-message">
                    <div class="message-content">
                        I am the synthesis of George's memory, grounded in truth. Ask me specific questions about what he builds, his background, or his values.
                        
                        <div class="suggestion-chips" style="margin-top: 15px; display: flex; flex-wrap: wrap; gap: 8px;">
                            <button class="chip" onclick="document.getElementById('questionInput').value = 'What does George do?'; document.getElementById('ask-btn').click();" style="background: rgba(0,210,255,0.1); border: 1px solid rgba(0,210,255,0.4); color: #fff; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s;">What does George do?</button>
                            <button class="chip" onclick="document.getElementById('questionInput').value = 'How does he work?'; document.getElementById('ask-btn').click();" style="background: rgba(0,210,255,0.1); border: 1px solid rgba(0,210,255,0.4); color: #fff; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s;">How does he work?</button>
                            <button class="chip" onclick="document.getElementById('questionInput').value = 'What\'s he building?'; document.getElementById('ask-btn').click();" style="background: rgba(0,210,255,0.1); border: 1px solid rgba(0,210,255,0.4); color: #fff; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s;">What's he building?</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="input-container">
                <input type="text" id="questionInput" placeholder="Ask about projects, background, vision..." autocomplete="off">
                <button id="ask-btn">
                    <svg viewBox="0 0 24 24" fill="none" class="send-icon">
                        <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Three.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
